name: Build Hardened Image, Push, Rescan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dockerfiles/**'
      - '.github/workflows/build-push-rescan.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: wordpress-hardened

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      # secrets cannot be used in `if:` — map to env first (empty string when unset)
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          TAGS="${TAGS},${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          if [ -n "${{ env.DOCKERHUB_USERNAME }}" ]; then
            TAGS="${TAGS},${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
            TAGS="${TAGS},${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push hardened image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile.hardened
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  rescan-hardened:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start hardened stack
        working-directory: docker
        env:
          HARDENED_IMAGE: ghcr.io/${{ github.repository_owner }}/wordpress-hardened:latest
          MYSQL_ROOT_PASSWORD: SecureRoot!CI
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: SecureWp!CI
          WORDPRESS_PORT: 8080
        run: |
          docker compose -f docker-compose.hardened.yml pull wordpress || true
          docker compose -f docker-compose.hardened.yml up -d --no-build

      - name: Wait for hardened WordPress
        run: |
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "Hardened WordPress ready (HTTP ${CODE})"
              exit 0
            fi
            echo "Attempt $i/60 (HTTP ${CODE})..."
            sleep 5
          done
          docker compose -f docker/docker-compose.hardened.yml ps
          docker compose -f docker/docker-compose.hardened.yml logs wordpress
          exit 1

      - name: Install WPScan
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full build-essential libcurl4-openssl-dev zlib1g-dev
          sudo gem install wpscan

      - name: Rescan after remediation
        run: |
          mkdir -p scans
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          wpscan --url http://localhost:8080 --enumerate u,vp,vt --format cli \
            -o "scans/after-remediation-${STAMP}.txt" --force || true
          wpscan --url http://localhost:8080 --enumerate u,vp,vt --format json \
            -o "scans/after-remediation-${STAMP}.json" --force || true
          ls -la scans/

      - name: Upload post-remediation scan
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-after-remediation
          path: scans/

      - name: Cleanup
        if: always()
        working-directory: docker
        run: docker compose -f docker-compose.hardened.yml down -v || true
